<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>PMR 仪表盘</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#090a0f;--bg2:#111318;--bd:#1e222a;--tx:#e8eaed;--t2:#8b95a5;--t3:#555d6a;--ac:#4a9eff;--g:#22c55e;--a:#f59e0b;--r:#ef4444}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',system-ui,sans-serif;font-size:13px;line-height:1.6;padding-bottom:40px}
a{color:inherit;text-decoration:none}
nav{position:sticky;top:0;z-index:200;background:rgba(9,10,15,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:0 16px}
.nh{display:flex;align-items:center;justify-content:space-between;height:48px}
.br h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.nr{display:flex;align-items:center;gap:10px}.nd{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.leg{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 16px;font-size:10px;color:var(--t2);display:flex;flex-wrap:wrap;gap:8px 14px}
.leg b{color:var(--tx);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:9px}
.tabs{display:flex;position:sticky;top:48px;z-index:100;background:rgba(9,10,15,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.ti{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.ti:hover{color:var(--tx)}.ti.ac{border-bottom-color:var(--ac);color:var(--ac)}
.app{max-width:960px;margin:0 auto;padding:0 16px}
.sec-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);padding:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec-h .b{flex:1;height:1px;background:var(--bd)}
.tp{display:none}.tp.ac{display:block}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;margin-bottom:10px;overflow:hidden}
.card-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.rk{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff;letter-spacing:.3px}
.rk.g{background:linear-gradient(135deg,#f59e0b,#d97706)}.rk.y{background:linear-gradient(135deg,#64748b,#475569)}.rk.r{background:linear-gradient(135deg,#b45309,#92400e)}.rk.d{background:#1e222a;color:var(--t3)}
.card-h .nm{font-size:14px;font-weight:600;flex:1}
.card-h .lk{background:rgba(74,158,255,.08);color:var(--ac);font-size:10px;padding:3px 6px;border-radius:4px}
.cb{padding:14px 16px}
.mg{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
.mc{background:var(--bg);border-radius:6px;padding:8px 4px;text-align:center}
.mc .v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.mc .l{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.mc.g .v{color:var(--g)}.mc.y .v{color:var(--a)}.mc.r .v{color:var(--r)}
.notes{font-size:11px;color:var(--t2);margin-bottom:8px;line-height:1.5}
.risks{background:rgba(239,68,68,.06);border-left:3px solid var(--r);padding:8px 12px;margin:8px 0;border-radius:0 6px 6px 0;font-size:11px;color:#fca5a5;line-height:1.5}
.action{background:rgba(74,158,255,.06);border-left:3px solid var(--ac);padding:8px 12px;margin:8px 0;border-radius:0 6px 6px 0;font-size:11px;color:#93c5fd;line-height:1.5}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:4px}
.t{width:100%;border-collapse:collapse;font-size:10px;font-family:'JetBrains Mono',monospace}
.t th{background:var(--bg2);padding:8px 4px;text-align:center;color:var(--t2);font-weight:600;font-size:9px;letter-spacing:.3px}
.t td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--bd)}
.t td:first-child{font-family:'DM Sans',sans-serif;font-weight:600;color:var(--tx)}
.tg{color:var(--g)}.ty{color:var(--a)}.tr{color:var(--r)}
.gs{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px}
.gh{padding:14px 16px;cursor:pointer;font-weight:600;font-size:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd)}
.ha{font-size:9px;transition:.2s;color:var(--t3)}.gh.open .ha{transform:rotate(90deg);color:var(--ac)}
.gc{padding:16px;display:none}.gc.open{display:block}
.gc h4{font-size:10px;font-weight:700;color:var(--ac);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.6px}
.gc p,.gc li{font-size:11px;color:var(--t2);margin-bottom:4px}
.gc ul{padding-left:14px;margin-bottom:6px}
.gc table{width:100%;border-collapse:collapse;margin:8px 0;font-size:10px}
.gc th{background:var(--bg);padding:5px 8px;text-align:left;color:var(--tx);font-weight:600}
.gc td{padding:5px 8px;border-bottom:1px solid var(--bd);color:var(--t2)}
.fm{background:var(--bg);padding:8px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;color:var(--g);margin:6px 0;font-size:10px}
.ft{text-align:center;padding:20px 8px;font-size:9px;color:var(--t3);border-top:1px solid var(--bd);margin-top:16px}
.ft b{color:var(--ac)}
<script>
function sw(id, el) {
  document.querySelectorAll(".tp").forEach(p => p.classList.remove("ac"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("ac"));
  var panel = document.getElementById(id);
  if (panel) panel.classList.add("ac");
  if (el) el.classList.add("ac");
}
</script>
</body>
</html>
